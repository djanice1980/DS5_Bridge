<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14161c"/>
      <stop offset="1" stop-color="#0e1014"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8532C0"/>
      <stop offset="1" stop-color="#5b7cfa"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5b7cfa"/>
    </marker>
    <style>
      .card{fill:#1b1e26;stroke:#2c313d;stroke-width:1.5;rx:12;}
      .lbl{fill:#d7dae0;}
      .mut{fill:#8a8f98;}
      .pill{fill:#241a33;stroke:#8532C0;stroke-width:1.2;}
      .pilltxt{fill:#c9a6ff;font-weight:600;}
      .h{fill:#ffffff;font-weight:700;}
      .wire{stroke:#3a4150;stroke-width:2;fill:none;}
      .btwire{stroke:#5b7cfa;stroke-width:2.5;fill:none;stroke-dasharray:2 5;stroke-linecap:round;}
    </style>
  </defs>

  <rect width="960" height="620" fill="url(#bg)"/>
  <text x="40" y="52" class="h" font-size="26">Four controllers, four bridges, one PC</text>
  <text x="40" y="80" class="mut" font-size="15">Each Pico 2 W owns its own Bluetooth link, so every controller keeps full features — audio, haptics, adaptive triggers.</text>

  <!-- Controllers column -->
  <text x="70" y="128" class="mut" font-size="13" letter-spacing="2">CONTROLLERS</text>
  <!-- controller template repeated -->
  <g>
    <!-- C1 -->
    <rect class="card" x="40" y="140" width="250" height="78" rx="12"/>
    <circle cx="78" cy="179" r="20" fill="#2a2f3a" stroke="#3a4150"/>
    <circle cx="70" cy="179" r="6" fill="#5b7cfa"/><circle cx="86" cy="179" r="6" fill="#5b7cfa"/>
    <text x="112" y="172" class="lbl" font-size="16" font-weight="600">David’s DualSense</text>
    <rect class="pill" x="112" y="184" width="150" height="22" rx="11"/>
    <text x="122" y="199" class="pilltxt" font-size="12">profile: “David”</text>
    <!-- C2 -->
    <rect class="card" x="40" y="232" width="250" height="78" rx="12"/>
    <circle cx="78" cy="271" r="20" fill="#2a2f3a" stroke="#3a4150"/>
    <circle cx="70" cy="271" r="6" fill="#8532C0"/><circle cx="86" cy="271" r="6" fill="#8532C0"/>
    <text x="112" y="264" class="lbl" font-size="16" font-weight="600">Jay’s Edge</text>
    <rect class="pill" x="112" y="276" width="150" height="22" rx="11"/>
    <text x="122" y="291" class="pilltxt" font-size="12">profile: “Jay”</text>
    <!-- C3 -->
    <rect class="card" x="40" y="324" width="250" height="78" rx="12"/>
    <circle cx="78" cy="363" r="20" fill="#2a2f3a" stroke="#3a4150"/>
    <circle cx="70" cy="363" r="6" fill="#5b7cfa"/><circle cx="86" cy="363" r="6" fill="#5b7cfa"/>
    <text x="112" y="356" class="lbl" font-size="16" font-weight="600">Player 3</text>
    <rect class="pill" x="112" y="368" width="150" height="22" rx="11"/>
    <text x="122" y="383" class="pilltxt" font-size="12">profile: “Racing”</text>
    <!-- C4 -->
    <rect class="card" x="40" y="416" width="250" height="78" rx="12"/>
    <circle cx="78" cy="455" r="20" fill="#2a2f3a" stroke="#3a4150"/>
    <circle cx="70" cy="455" r="6" fill="#5b7cfa"/><circle cx="86" cy="455" r="6" fill="#5b7cfa"/>
    <text x="112" y="448" class="lbl" font-size="16" font-weight="600">Player 4</text>
    <rect class="pill" x="112" y="460" width="150" height="22" rx="11"/>
    <text x="122" y="475" class="pilltxt" font-size="12">profile: “Default”</text>
  </g>

  <!-- Bridges column -->
  <text x="470" y="128" class="mut" font-size="13" letter-spacing="2">PICO 2 W BRIDGES</text>
  <g>
    <rect class="card" x="440" y="140" width="220" height="78" rx="12"/>
    <rect x="462" y="160" width="40" height="38" rx="5" fill="#20252f" stroke="#3a4150"/>
    <text x="516" y="176" class="lbl" font-size="15" font-weight="600">“Living Room”</text>
    <text x="516" y="196" class="mut" font-size="12">id · dd32a0bc…</text>

    <rect class="card" x="440" y="232" width="220" height="78" rx="12"/>
    <rect x="462" y="252" width="40" height="38" rx="5" fill="#20252f" stroke="#3a4150"/>
    <text x="516" y="268" class="lbl" font-size="15" font-weight="600">“Desk”</text>
    <text x="516" y="288" class="mut" font-size="12">id · 7fbd1688…</text>

    <rect class="card" x="440" y="324" width="220" height="78" rx="12"/>
    <rect x="462" y="344" width="40" height="38" rx="5" fill="#20252f" stroke="#3a4150"/>
    <text x="516" y="360" class="lbl" font-size="15" font-weight="600">“Bedroom”</text>
    <text x="516" y="380" class="mut" font-size="12">id · a41cb90d…</text>

    <rect class="card" x="440" y="416" width="220" height="78" rx="12"/>
    <rect x="462" y="436" width="40" height="38" rx="5" fill="#20252f" stroke="#3a4150"/>
    <text x="516" y="452" class="lbl" font-size="15" font-weight="600">“Den”</text>
    <text x="516" y="472" class="mut" font-size="12">id · 6b2e77f1…</text>
  </g>

  <!-- BT links controller->bridge -->
  <path class="btwire" d="M290 179 C 370 179, 360 179, 440 179"/>
  <path class="btwire" d="M290 271 C 370 271, 360 271, 440 271"/>
  <path class="btwire" d="M290 363 C 370 363, 360 363, 440 363"/>
  <path class="btwire" d="M290 455 C 370 455, 360 455, 440 455"/>
  <text x="332" y="166" fill="#5b7cfa" font-size="11" text-anchor="middle">Bluetooth</text>

  <!-- PC -->
  <rect class="card" x="770" y="250" width="150" height="120" rx="12"/>
  <rect x="798" y="276" width="94" height="58" rx="6" fill="#20252f" stroke="#3a4150"/>
  <rect x="820" y="338" width="50" height="8" rx="2" fill="#2a2f3a"/>
  <text x="845" y="360" class="lbl" font-size="14" font-weight="600" text-anchor="middle">Windows PC</text>
  <text x="845" y="238" class="mut" font-size="12" text-anchor="middle">sees 4 DualSense</text>
  <text x="845" y="392" class="mut" font-size="12" text-anchor="middle">controllers</text>

  <!-- USB bridge->PC -->
  <path class="wire" d="M660 179 C 720 179, 720 300, 770 300" marker-end="url(#arrow)"/>
  <path class="wire" d="M660 271 C 715 271, 725 305, 770 305" marker-end="url(#arrow)"/>
  <path class="wire" d="M660 363 C 715 363, 725 315, 770 315" marker-end="url(#arrow)"/>
  <path class="wire" d="M660 455 C 720 455, 720 320, 770 320" marker-end="url(#arrow)"/>
  <text x="712" y="200" class="mut" font-size="11" text-anchor="middle">USB</text>

  <!-- Footer note -->
  <rect x="40" y="526" width="880" height="66" rx="10" fill="#161922" stroke="#2c313d"/>
  <text x="60" y="552" class="lbl" font-size="14" font-weight="600">Profiles follow the controller.</text>
  <text x="60" y="574" class="mut" font-size="13">Move David’s controller to any bridge and the “David” profile goes with it — the bridge is identified by its own hardware id, the controller by its Bluetooth address, so nothing gets mixed up.</text>
</svg>

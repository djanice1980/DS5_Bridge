# DS5 Bridge — expose the controller's four audio channels.
#
# ALSA ships a UCM profile for the Sony DualSense that assumes a real
# controller's stereo-only speaker. Applied to the DS5 Bridge it splits the
# device into a stereo "Speaker" sink that hides the two haptic channels and
# attenuates the speaker ~6 dB ("[ALSA UCM error]" in the node name).
#
# Forcing the plain ALSA card profile (ACP) instead gives one clean 4.0 sink:
# stereo maps to the front pair (FL/FR) at full level, and the rear pair
# (RL/RR) carries the haptics, which is what the companion writes into.
#
# Matches the DualSense and DualShock 4 personas (both contain "Controller");
# disabling UCM on a device without a UCM profile is a harmless no-op.
monitor.alsa.rules = [
  {
    matches = [
      { device.name = "~alsa_card.*Controller.*" }
    ]
    actions = {
      update-props = {
        api.alsa.use-acp = true
        api.alsa.use-ucm = false
      }
    }
  }
]
